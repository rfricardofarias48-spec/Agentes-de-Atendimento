services:
  mem0:
    build:
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        RUN apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
        RUN git clone --depth 1 https://github.com/mem0ai/mem0.git /tmp/mem0 && cp -r /tmp/mem0/server/. /app/ && rm -rf /tmp/mem0
        RUN pip install --no-cache-dir fastapi==0.115.8 uvicorn==0.34.0 "pydantic[email]==2.10.4" "mem0ai[graph]>=0.1.48" python-dotenv==1.0.1 "psycopg[binary,pool]>=3.2.8" "psycopg-pool>=3.2.6,<4.0.0" "sqlalchemy>=2.0,<3.0" "alembic>=1.13,<2.0" anthropic "passlib[bcrypt]" bcrypt==4.0.1 "python-jose[cryptography]" slowapi rank-bm25 langchain-neo4j neo4j posthog
        EXPOSE 8000
        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8888:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mem0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mem0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mem0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.4
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
